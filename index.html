<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard CRM · Comercial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;height:100vh;overflow:hidden;}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;width:360px;border:1px solid #e8eaed;}
.login-logo{width:90px;height:90px;border-radius:12px;overflow:hidden;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;background:#fff;}
.login-card h2{font-size:18px;font-weight:700;color:#1a1f2e;text-align:center;margin-bottom:4px;}
.login-card p{font-size:13px;color:#888;text-align:center;margin-bottom:24px;}
.lf label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px;}
.lf input{width:100%;padding:9px 12px;border:1px solid #dde1e7;border-radius:8px;font-size:13px;outline:none;margin-bottom:12px;font-family:inherit;}
.lf input:focus{border-color:#534AB7;}
.login-btn{width:100%;padding:10px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.login-btn:hover{background:#3C3489;}
.login-error{font-size:12px;color:#E24B4A;text-align:center;margin-top:8px;min-height:16px;}
/* APP */
#app{display:none;height:100vh;overflow:hidden;}
.layout{display:flex;height:100vh;}
/* sidebar */
.sidebar{width:52px;background:#1a1f2e;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;}
.sb-logo{width:38px;height:38px;border-radius:8px;overflow:hidden;margin-bottom:10px;background:#fff;display:flex;align-items:center;justify-content:center;}
.sb-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#8892a4;font-size:18px;cursor:pointer;}
.sb-icon:hover,.sb-icon.active{background:#2d3548;color:#fff;}
.sb-spacer{flex:1;}
.sb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;margin-top:6px;}
/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* topbar */
.topbar{background:#fff;border-bottom:1px solid #e8eaed;padding:8px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.page-title{font-size:14px;font-weight:700;color:#1a1f2e;}
.badge-role{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.user-name{font-size:12px;color:#666;}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid #dde1e7;background:#fff;color:#555;cursor:pointer;}
.btn-sm:hover{background:#f5f5f5;}
.filter-sel{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #dde1e7;background:#fff;color:#444;cursor:pointer;height:28px;}
.import-lbl{font-size:11px;padding:4px 12px;border-radius:8px;border:1px dashed #bbb;background:#fff;color:#555;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit;}
/* tab nav */
.tab-nav{background:#fff;border-bottom:1px solid #e8eaed;padding:0 18px;display:flex;gap:2px;flex-shrink:0;overflow-x:auto;}
.tab-nav::-webkit-scrollbar{height:3px;}
.tab-nav::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.tab-item{display:flex;align-items:center;gap:6px;padding:10px 14px;font-size:12px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
.tab-item:hover{color:#534AB7;}
.tab-item.active{color:#534AB7;border-bottom-color:#534AB7;}
.origen-opt:hover{background:#f5f3ff;color:#534AB7;}
.origen-opt.active{background:#534AB7;color:#fff;}
.tab-item .tab-dot{width:8px;height:8px;border-radius:50%;}
/* content */
.content{flex:1;overflow-y:auto;padding:18px;}
/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:12px 14px;}
.kpi-label{font-size:11px;color:#888;margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:700;color:#1a1f2e;line-height:1;}
.kpi-sub{font-size:11px;margin-top:4px;}
.kpi-sub.up{color:#1D9E75;} .kpi-sub.down{color:#E24B4A;} .kpi-sub.neutral{color:#888;}
/* cards row */
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.card{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:14px 16px;}
.card-title{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.3px;margin-bottom:12px;}
/* funnel bars */
.funnel-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.funnel-row span.lbl{font-size:11px;color:#666;width:62px;flex-shrink:0;}
.funnel-track{flex:1;background:#f0f2f5;border-radius:4px;height:14px;overflow:hidden;}
.funnel-fill{height:100%;border-radius:4px;}
.funnel-row span.pct{font-size:11px;font-weight:700;width:32px;text-align:right;}
/* mini bar */
.mini-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mini-bar-row .lbl{font-size:11px;color:#666;width:70px;flex-shrink:0;}
.mini-track{flex:1;background:#f0f2f5;border-radius:4px;height:11px;overflow:hidden;}
.mini-fill{height:100%;border-radius:4px;}
.mini-bar-row .pct{font-size:11px;font-weight:700;width:32px;text-align:right;}
/* team hunter cards */
.hunters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px;}
.hunter-card{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:14px;}
.hunter-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.hunter-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.hunter-name{font-size:13px;font-weight:700;color:#1a1f2e;}
.hunter-role{font-size:11px;color:#888;}
.progress-bar{height:7px;background:#f0f2f5;border-radius:4px;overflow:hidden;margin:8px 0 4px;}
.progress-fill{height:100%;border-radius:4px;}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;color:#888;}
.hunter-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;}
.hstat{background:#f7f8fa;border-radius:6px;padding:5px 6px;text-align:center;}
.hstat-val{font-size:14px;font-weight:700;color:#1a1f2e;}
.hstat-lbl{font-size:9px;color:#aaa;margin-top:1px;}
/* leads table */
.tbl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.ftab{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #dde1e7;background:#fff;color:#666;cursor:pointer;}
.ftab:hover{background:#f0f0f0;}
.ftab.active{background:#534AB7;color:#fff;border-color:#534AB7;}
.search-box{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #dde1e7;background:#f7f8fa;color:#333;width:140px;outline:none;}
.btn-new{font-size:12px;padding:5px 14px;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;font-weight:500;}
.btn-new:hover{background:#3C3489;}
.tbl-wrap{background:#fff;border:1px solid #e8eaed;border-radius:10px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#f7f8fa;}
th{padding:8px 10px;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #e8eaed;white-space:nowrap;text-align:left;}
td{padding:7px 10px;border-bottom:1px solid #f0f2f5;vertical-align:middle;color:#333;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbff;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.sbadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;}
.ecell{border:none;background:transparent;font-size:12px;color:#333;width:100%;padding:1px 2px;font-family:inherit;}
.ecell:focus{background:#f0f2f5;border-radius:3px;outline:none;}
.ecell[readonly]{color:#999;cursor:default;}
.alink{font-size:11px;color:#534AB7;cursor:pointer;font-weight:500;}
.alink:hover{text-decoration:underline;}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:420px;padding:24px;position:relative;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;}
.mf label{font-size:11px;color:#888;display:block;margin-bottom:4px;font-weight:500;}
.mf input,.mf select,.mf textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #dde1e7;border-radius:8px;font-family:inherit;outline:none;margin-bottom:10px;}
.mf input:focus,.mf select:focus{border-color:#534AB7;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
.btn-cancel{font-size:12px;padding:7px 16px;border-radius:8px;border:1px solid #dde1e7;background:#fff;cursor:pointer;}
.btn-save{font-size:12px;padding:7px 16px;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;font-weight:600;}
.close-modal{position:absolute;top:14px;right:14px;border:none;background:none;font-size:18px;cursor:pointer;color:#888;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}
</style>
</head>

async function sbGet(table, params=''){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, body){
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(body)
  });
  const data = await r.json();
  if(!r.ok){
    const msg = (data && data.message) ? data.message : `HTTP ${r.status}`;
    throw new Error(msg);
  }
  if(Array.isArray(data) && data.length===0){
    throw new Error('No se pudo insertar (0 filas). Verifica el permiso INSERT (RLS) de la tabla "'+table+'" en Supabase.');

}

  const s = (e||'').toLowerCase().trim();

/* ─── AUTH ─── */
/* ── BLOQUEO DE LOGIN: 3 intentos fallidos = 5 min de espera ── */
const LOGIN_MAX_ATTEMPTS = 3;
const LOGIN_LOCK_MS = 5 * 60 * 1000; // 5 minutos

function getLoginLockKey(username){ return 'login_lock_'+username; }

function checkLoginLock(username){
  try {
    const raw = localStorage.getItem(getLoginLockKey(username));
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(data.lockedUntil && Date.now() < data.lockedUntil){
      return Math.ceil((data.lockedUntil - Date.now())/1000); // segundos restantes
    }
    if(data.lockedUntil && Date.now() >= data.lockedUntil){
      localStorage.removeItem(getLoginLockKey(username)); // expiró el bloqueo
    }
    return null;
  } catch(e){ return null; }
}

function registerFailedAttempt(username){
  try {
    const key = getLoginLockKey(username);
    const raw = localStorage.getItem(key);
    let data = raw ? JSON.parse(raw) : {attempts:0};
    data.attempts = (data.attempts||0) + 1;
    if(data.attempts >= LOGIN_MAX_ATTEMPTS){
      data.lockedUntil = Date.now() + LOGIN_LOCK_MS;
      data.attempts = 0;
    }
    localStorage.setItem(key, JSON.stringify(data));
    return data;
  } catch(e){ return {}; }
}

function clearLoginAttempts(username){
  try { localStorage.removeItem(getLoginLockKey(username)); } catch(e){}
}

function formatLockTime(seconds){
  const m = Math.floor(seconds/60);
  const s = seconds%60;
  return m>0 ? `${m} min ${s}s` : `${s}s`;
}

async function doLogin(){

  const password = document.getElementById('lp').value;
  const btn = document.querySelector('.login-btn');
  const errEl = document.getElementById('lerr');
  errEl.textContent = '';
  if(!username || !password){ errEl.textContent='Ingresa usuario y contraseña.'; return; }

  /* Verificar si el usuario está bloqueado */
  const lockSeconds = checkLoginLock(username);
  if(lockSeconds){
    errEl.textContent = `🔒 Usuario bloqueado. Espera ${formatLockTime(lockSeconds)} para volver a intentar.`;
    return;
  }

  btn.textContent = 'Verificando...'; btn.disabled = true;
  try {
    const rows = await sbGet('usuarios',
      `username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&activo=eq.true&select=*`
    );
    if(!rows || rows.length === 0){
      const data = registerFailedAttempt(username);
      if(data.lockedUntil){
        errEl.textContent = '🔒 Usuario bloqueado por 3 intentos fallidos. Espera 5 minutos.';
      } else {
        const remaining = LOGIN_MAX_ATTEMPTS - (data.attempts||0);
        errEl.textContent = `Usuario o contraseña incorrectos. Te quedan ${remaining} intento(s).`;
      }
      btn.textContent='Ingresar'; btn.disabled=false; return;
    }
    /* Login exitoso - limpiar contador de intentos */
    clearLoginAttempts(username);
    const u = rows[0];
    curUser = {
      username: u.username,
      name:     u.nombre,
      role:     u.rol,          /* director / head / hunter */

      id:       u.id,
      hunter:   u.username

    /* cargar todos los usuarios para el dashboard */

    SB_USUARIOS = await sbGet('usuarios','select=*&activo=eq.true');
    /* cargar leads */

          real: 0

    /* Rebuild HUNTERS map */

    HUNTERS_DEF.forEach(h => { HUNTERS[h.username] = h; });
    console.log('HUNTERS loaded:', Object.keys(HUNTERS).length, 'hunters');
    console.log('LEADS loaded:', LEADS.length, 'leads');
    HUNTERS_A.length = 0; HUNTERS_B.length = 0;
    HUNTERS_DEF.filter(h=>h.team==='A').forEach(h=>HUNTERS_A.push(h));
    HUNTERS_DEF.filter(h=>h.team==='B').forEach(h=>HUNTERS_B.push(h));

    TEAMS.B.hunters = HUNTERS_B.map(h=>h.username);

    /* Heads */

    if(headB){ TEAMS.B.head = headB.nombre; TEAMS.B.headColor = headB.color||'#A855F7'; }

    /* ── Transformar leads de Supabase al formato interno ── */

      prob:          l.probabilidad || 10,
      conflict:      l.conflicto || false,
      created:       l.created_at ? new Date(l.created_at).toLocaleDateString('es-PE') : '',
      fecha_ingreso: l.fecha_ingreso ? new Date(l.fecha_ingreso).toLocaleDateString('es-PE') : (l.created_at ? new Date(l.created_at).toLocaleDateString('es-PE') : '—'),
      fecha_ingreso_raw: l.fecha_ingreso || (l.created_at ? l.created_at.slice(0,10) : ''),
      fecha_cierre_dt: l.fecha_cierre ? new Date(l.fecha_cierre).toLocaleDateString('es-PE') : '—',
      fecha_cierre_raw: l.fecha_cierre ? l.fecha_cierre.slice(0,10) : '',
      fecha_modif:   l.fecha_modif ? new Date(l.fecha_modif).toLocaleDateString('es-PE') : (l.updated_at ? new Date(l.updated_at).toLocaleDateString('es-PE') : '—'),
      fecha_modif_raw: l.fecha_modif || (l.updated_at ? l.updated_at.slice(0,10) : ''),
      fecha_mod_late: l.fecha_modif ? (Date.now()-new Date(l.fecha_modif).getTime())>86400000 : (l.updated_at ? (Date.now()-new Date(l.updated_at).getTime())>86400000 : false),
      modified_today: l.fecha_modif ? new Date(l.fecha_modif).toDateString()===new Date().toDateString() : (l.updated_at ? new Date(l.updated_at).toDateString()===new Date().toDateString() : false),
    }));

    /* Re-map any old status values to new ones */
    LEADS.forEach(l => { l.status = mapEstado(l.status); });

    /* Actualizar real en HUNTERS */
    HUNTERS_DEF.forEach(h => { h.real = 0; }); // reset
    LEADS.forEach(l => {
      if(HUNTERS[l.hunter]) HUNTERS[l.hunter].real += (l.value||0);
    });

    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } catch(e){
    errEl.textContent = 'Error de conexión: ' + e.message;
  }
  btn.textContent='Ingresar'; btn.disabled=false;
}

function renderKPI(){
  /* ── Apply filters ── */
  const fHunter = document.getElementById('kpi-hunter')?.value || '';
  const fTeam   = document.getElementById('kpi-team')?.value || '';
  const fProd   = document.getElementById('kpi-prod')?.value || '';

  /* Populate hunter dropdown from real data */
  const hunterSel = document.getElementById('kpi-hunter');
  if(hunterSel && hunterSel.options.length <= 1){
    const hunters = [...new Set((LEADS||[]).map(l=>l.owner).filter(Boolean))].sort();
    hunters.forEach(h=>{
      const o = document.createElement('option'); o.value=h; o.textContent=h;
      hunterSel.appendChild(o);
    });
  }

  let leads = (LEADS||[]).filter(l=>{
    if(fHunter && l.owner !== fHunter) return false;
    if(fTeam){ const h=HUNTERS[l.hunter]; if(!h||h.team!==fTeam) return false; }
    if(fProd && (l.tipo_producto||'').toUpperCase() !== fProd.toUpperCase()) return false;
    return true;
  });

  /* ── Core metrics ── */
  const total     = leads.length;
  const cerrados  = leads.filter(l=>l.categoria==='cerrado'||l.status==='cerrado');
  const caidos    = leads.filter(l=>l.categoria==='caido');
  const activos   = leads.filter(l=>l.categoria==='activo'&&l.status!=='cerrado');
  const wonRev    = cerrados.reduce((s,l)=>s+(l.value||0),0);
  const lostRev   = caidos.reduce((s,l)=>s+(l.value||0),0);
  const pipeRev   = activos.reduce((s,l)=>s+(l.value||0),0);
  const wonPct    = total>0?Math.round(cerrados.length/total*100):0;
  const lostPct   = total>0?Math.round(caidos.length/total*100):0;
  const costLead  = total>0?Math.round((wonRev+lostRev+pipeRev)/total):0;

  /* ── Stage breakdown ── */
  const STAGES = ['prospecto','oportunidad','negociacion','precierre','cerrado'];
  const SLABELS = {'prospecto':'10% Prospección','oportunidad':'25% Oportunidad','negociacion':'50% Negociación','precierre':'75% Pre-cierre','cerrado':'100% Cierre'};
  const SCOLORS = {'prospecto':'#3DB8E8','oportunidad':'#7F77DD','negociacion':'#F5A623','precierre':'#E8721C','cerrado':'#1D9E75'};
  const stageData = STAGES.map(s=>({
    key:s, label:SLABELS[s], color:SCOLORS[s],
    count: leads.filter(l=>l.status===s).length,
    value: leads.filter(l=>l.status===s).reduce((sum,l)=>sum+(l.value||0),0)

    hunterStats[l.owner].total++;
    hunterStats[l.owner].value += (l.value||0);
    if(l.categoria==='cerrado'||l.status==='cerrado') hunterStats[l.owner].cerrados++;
  });
  /* Add color from HUNTERS */
  Object.values(hunterStats).forEach(h=>{
    const hu = Object.values(HUNTERS).find(x=>x.name===h.name);
    if(hu) h.color = hu.color;
  });
  const topHunters = Object.values(hunterStats)
    .sort((a,b)=>b.cerrados-a.cerrados).slice(0,10);

  const openDeals = leads
    .filter(l=>l.categoria==='activo')
    .sort((a,b)=>(b.value||0)-(a.value||0));

  /* ── Bancos breakdown ── */

  const bancoTop = Object.entries(bancoCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

let _autoSyncTimer = null;
function startAutoSync(){
  if(_autoSyncTimer) clearInterval(_autoSyncTimer);
  _autoSyncTimer = setInterval(async ()=>{
    if(!curUser) return;
    /* No interrumpir si hay un modal abierto (evita pisar lo que se está editando) */
    if(document.getElementById('modal-bg')?.classList.contains('open')) return;
    if(document.getElementById('modal-sva-bg')?.classList.contains('open')) return;
    try {
      /* No re-renderizar si el usuario está escribiendo en algún campo */
      const active = document.activeElement;
      const isTyping = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA' || active.tagName==='SELECT');
      LEADS = await fetchLeads();
      if(!isTyping) renderTab(curTab);
    } catch(e){ /* silencioso */ }
  }, 30000); /* respaldo cada 30 segundos por si Realtime se desconecta */
}

/* Sincronización instantánea: escucha cambios en la tabla "leads" vía websocket.
   Cuando cualquier usuario inserta/edita/borra un lead, todos los demás lo ven
   al instante sin esperar el polling de 30s. */
let _syncDebounce = null;
let _isSavingLocally = false; /* flag: evita que realtime re-renderice cuando el mismo usuario guarda */

function startRealtimeSync(){
  if(!sbClient) return; /* si la librería no cargó, queda solo el polling */
  if(_realtimeChannel) sbClient.removeChannel(_realtimeChannel);

  _realtimeChannel = sbClient
    .channel('leads-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => {
      if(!curUser) return;
      /* No interrumpir si hay un modal abierto */
      if(document.getElementById('modal-bg')?.classList.contains('open')) return;
      if(document.getElementById('modal-sva-bg')?.classList.contains('open')) return;
      /* Si el propio usuario acaba de guardar, ignorar el evento realtime (ya actualizó localmente) */
      if(_isSavingLocally) return;
      /* Debounce: si llegan varios cambios casi juntos (ej. import masivo), recarga una sola vez */
      clearTimeout(_syncDebounce);
      _syncDebounce = setTimeout(async ()=>{
        try {
          /* No re-renderizar si el usuario está escribiendo en algún campo */
          const active = document.activeElement;
          const isTyping = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA' || active.tagName==='SELECT');
          LEADS = await fetchLeads();
          if(!isTyping) renderTab(curTab);
        } catch(e){ /* silencioso */ }
      }, 500);
    })
    .subscribe();
}

function stopRealtimeSync(){
  if(_realtimeChannel && sbClient){
    sbClient.removeChannel(_realtimeChannel);
    _realtimeChannel = null;
  }
}

/* Apply origen filter to a leads array */
function applyOrigenFilter(leads){
  if(!window.origenFilter) return leads;
  const f = window.origenFilter;
  return leads.filter(l=>{
    const src   = (l.source||'').toUpperCase().trim();
    const banco = (l.banco||'').toUpperCase().trim();

    if(f==='WINBANK'){
      /* "LEAD IZIPAY (WINBACK)" = WINBANK */
      return src.includes('WINBANK') || src.includes('IZIPAY') || src.includes('WINBACK');
    }
    if(f==='IBK'){
      /* "LEAD IBK" en origen, o banco Interbank */
      return src.includes('IBK') || src.includes('INTERBANK')
          || banco.includes('IBK') || banco.includes('INTERBANK');
    }
    if(f==='CENTRAL'){
      return src.includes('CENTRAL');
    }
    if(f==='PROPIO'){
      return src.includes('PROPIO');
    }
    return src.includes(f);
  });
}

/* Filtrar Cerrados/Caídos por hunter */
function filterCerradosByHunter(tipo){
  const hunterVal = document.getElementById('filter-hunter-'+tipo)?.value || '';
  const searchVal = (document.getElementById('srch-'+tipo)?.value || '').toLowerCase().trim();
  const rows = document.querySelectorAll(`#tbl-${tipo} tbody tr.lead-row`);
  rows.forEach(tr=>{
    const ruc = (tr.dataset.ruc||'').toLowerCase();
    const name = (tr.dataset.name||'').toLowerCase();
    const hunter = (tr.dataset.hunter||'').toLowerCase();
    const matchSearch = !searchVal || ruc.includes(searchVal) || name.includes(searchVal);
    const matchHunter = !hunterVal || hunter===hunterVal.toLowerCase();
    tr.style.display = (matchSearch && matchHunter) ? '' : 'none';
    /* también ocultar fila de historial si existe */
    const next = tr.nextElementSibling;
    if(next && next.classList.contains('historial-row')){
      next.style.display = (matchSearch && matchHunter) ? '' : 'none';
    }
  });
}

/* Mark a lead as cerrado or caido */
async function markLeadAs(leadId, categoria, key){
  if(!['director','analista','head'].includes(curUser.role)){
    alert('No tienes permisos.'); return;
  }
  const labels = {cerrado:'✅ Lead Cerrado', caido:'📉 Lead Caído', activo:'↩ Restaurado a Activo'};
  const msgs   = {
    cerrado:'¿Marcar este lead como CERRADO (100% Cierre)?',
    caido:  '¿Marcar este lead como CAÍDO (sin oportunidad)?',
    activo: '¿Restaurar este lead a ACTIVO?'
  };
  if(!confirm(msgs[categoria])) return;

  /* Update in Supabase */
  await sbPatch('leads', leadId, {
    categoria: categoria,
    estado: categoria==='cerrado' ? 'cerrado' : categoria==='activo' ? 'prospecto' : 'prospecto',
    updated_at: new Date().toISOString()
  });
  await saveHistorial(leadId, 'categoria', labels[categoria]);

  /* Update locally */
  const l = LEADS.find(x=>String(x.id)===String(leadId));
  if(l){
    l.categoria = categoria;
    if(categoria==='cerrado') l.status = 'cerrado';
  }

  renderTab(curTab);
  alert(labels[categoria]+' registrado correctamente.');
}

function exportAllLeads(){
  if(typeof XLSX === 'undefined'){ alert('SheetJS no cargó'); return; }
  const fHunter = window['al_hunter']||'';
  const fEstado = window['al_estado']||'all';
  const fMes    = window['al_mes']||'';
  const fSearch = window['al_search']||'';
  const filtered = (LEADS||[]).filter(l=>{
    if(fHunter && l.hunter !== fHunter) return false;
    if(fEstado !== 'all' && l.status !== fEstado) return false;
    if(fMes && l.close !== fMes) return false;
    if(fSearch && !l.name.toLowerCase().includes(fSearch.toLowerCase()) && !l.ruc.includes(fSearch)) return false;
    return true;
  });
  const rows = filtered.map(l=>({
    'Razón Social': l.name,
    'RUC': l.ruc||'',
    'Hunter': l.owner||'',
    'Equipo': HUNTERS[l.hunter]?.team||'',
    'Giros': l.giros||'',
    'Origen': l.source||'',
    'Tipo Producto': l.tipo_producto||'',
    'Tipo Cuenta': l.tipo_cuenta||'',
    'Banco': l.banco||'',
    'Potencial (S/)': l.value||0,
    'Etapa': SC[l.status]?.l||l.status,
    'Mes Cierre': l.close||'',
    'Comentario': l.note||'',
    'Fecha registro': l.created||'',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Leads');
  XLSX.writeFile(wb, `leads_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ── ACTIVE LEAD (excludes cerrado AND caido) - used for "Total" / "Leads Total" cards ── */
function isActiveLead(l){
  return l.categoria!=='caido' && l.categoria!=='cerrado' && l.status!=='cerrado';
}

/* ── KPI SINGLE CARD ── */
function kpiCard(label, val, sub, trend, color){
  const subCls = trend==='up'?'up':trend==='down'?'down':'neutral';
  const valStyle = color ? `style="color:${color};"` : '';
  return `<div class="kpi">
    <div class="kpi-label">${label}</div>
    <div class="kpi-val" ${valStyle}>${val}</div>
    <div class="kpi-sub ${subCls}">${sub}</div>
  </div>`;
}

/* ── KPI FUNNEL MINI CARD (50% / 75%) ── */
function kpiFunnelCard(label, leads){
  const total   = leads.reduce((s,l)=>s+(l.value||0),0);
  const neg50V  = leads.filter(l=>l.status==='negociacion').reduce((s,l)=>s+(l.value||0),0);
  const pre75V  = leads.filter(l=>l.status==='precierre').reduce((s,l)=>s+(l.value||0),0);
  return `<div class="kpi">
    <div class="kpi-label">${label}</div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:10px;color:#E8721C;font-weight:500;">50% Negociación</span>
        <span style="font-size:16px;font-weight:600;color:#E8721C;">S/ ${neg50V.toLocaleString()}</span>
      </div>
      <div style="height:3px;background:#f0f0f0;border-radius:2px;overflow:hidden;">
        <div style="width:${total>0?Math.round(neg50V/total*100):0}%;height:100%;background:#E8721C;border-radius:2px;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;">
        <span style="font-size:10px;color:#C0392B;font-weight:500;">75% Pre-cierre</span>
        <span style="font-size:16px;font-weight:600;color:#C0392B;">S/ ${pre75V.toLocaleString()}</span>
      </div>
      <div style="height:3px;background:#f0f0f0;border-radius:2px;overflow:hidden;">
        <div style="width:${total>0?Math.round(pre75V/total*100):0}%;height:100%;background:#C0392B;border-radius:2px;"></div>
      </div>
    </div>
  </div>`;
}

/* ── KPI RUC ROW ── */
function kpiRucRow(leads){
  const rucLeads  = leads.filter(l=>l.ruc && l.ruc.length>5); /* leads con RUC válido */
  const activosArr= rucLeads.filter(isActiveLead);
  const total     = activosArr.length;
  const cerrado   = rucLeads.filter(l=>l.categoria==='cerrado'||l.status==='cerrado').length;
  const perdido   = rucLeads.filter(l=>l.categoria==='caido').length;
  const totalConv = total + cerrado;
  const conv      = totalConv>0?Math.round(cerrado/totalConv*100):0;
  const convColor = conv>=30?'#1D9E75':conv>=15?'#F5A623':'#E24B4A';

  return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:6px;">

    ${kpiFunnelCardCount('RUC Funnel', activosArr)}

}

function kpiRowFlat(label, leads, tipoProd){
  const filtered = leads.filter(l=>(l.tipo_producto||'').toUpperCase()===tipoProd.toUpperCase());
  const cerradosArr = filtered.filter(l=>l.categoria==='cerrado'||l.status==='cerrado');
  const perdidosArr = filtered.filter(l=>l.categoria==='caido');
  const cerrados = cerradosArr.length;
  const perdidos = perdidosArr.length;
  const activosArr = filtered.filter(isActiveLead);
  const captura  = activosArr.reduce((s,l)=>s+(l.value||0),0);
  const totalCaptura = activosArr.length + cerrados;
  const conv     = totalCaptura>0 ? Math.round(cerrados/totalCaptura*100) : 0;
  const convColor= conv>=30?'#1D9E75':conv>=15?'#F5A623':'#E24B4A';

  /* QR y PLANILLAS se miden por CANTIDAD de leads; ARISALE se mide en S/ */
  const byCount = (tipoProd.toUpperCase()==='QR' || tipoProd.toUpperCase()==='PLANILLAS');

  const totalCard   = byCount ? kpiCard(label+' Total', filtered.length, 'leads totales','neutral')
                               : kpiCard(label+' Total','S/ '+captura.toLocaleString(),'captura potencial','neutral');
  const leadsTotalCard = byCount ? kpiFunnelCardCount(label+' Leads Total', activosArr)
                                  : kpiFunnelCard(label+' Leads Total', activosArr);
  const cerradoCard = byCount ? kpiCard(label+' Cerrado', cerrados, '100% Cierre','up','#1D9E75')
                               : kpiCard(label+' Cerrado','S/ '+cerradosArr.reduce((s,l)=>s+(l.value||0),0).toLocaleString(),'100% Cierre','up','#1D9E75');
  const perdidoCard = byCount ? kpiCard(label+' Perdido', perdidos, 'caídos','down','#E24B4A')
                               : kpiCard(label+' Perdido','S/ '+perdidosArr.reduce((s,l)=>s+(l.value||0),0).toLocaleString(),'caídos','down','#E24B4A');

  return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:6px;">
    ${totalCard}
    ${leadsTotalCard}
    ${cerradoCard}
    ${perdidoCard}
    ${kpiCard('% Conversión '+label,conv+'%','cerrados / '+label.toLowerCase()+' total',conv>=30?'up':conv>=15?'neutral':'down',convColor)}
  </div>`;
}

/* ─── HELPERS ─── */
function funnelHTML(leads){
  const stages=[
    {k:'prospecto',   l:'10% Prospección',c:'#3DB8E8'},
    {k:'oportunidad', l:'25% Oportunidad', c:'#7F77DD'},
    {k:'negociacion', l:'50% Negociación', c:'#F5A623'},
    {k:'precierre',   l:'75% Pre-cierre',  c:'#E8721C'},
    {k:'cerrado',   l:'Cerrado',   c:'#639922'},
  ];
  const max=leads.length||1;
  return stages.map(s=>{
    const n=leads.filter(l=>l.status===s.k).length;
    const w=Math.max(Math.round(n/max*100),n>0?8:0);
    return `<div class="funnel-row">
      <span class="lbl">${s.l}</span>
      <div class="funnel-track"><div class="funnel-fill" style="width:${w}%;background:${s.c};"></div></div>
      <span class="pct" style="color:${s.c};">${n}</span>
    </div>`;
  }).join('');
}

function sourceHTML(leads){
  const sources={};
  leads.forEach(l=>{sources[l.source]=(sources[l.source]||0)+1;});
  const total=leads.length||1;
  const colors={'Google Ads':'#378ADD','Referido':'#EF9F27','Directo':'#E24B4A','LinkedIn':'#534AB7','Evento':'#1D9E75'};
  return Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([s,n])=>`
    <div class="mini-bar-row">
      <span class="lbl">${s}</span>
      <div class="mini-track"><div class="mini-fill" style="width:${Math.round(n/total*100)}%;background:${colors[s]||'#888'};"></div></div>
      <span class="pct" style="color:${colors[s]||'#888'};">${Math.round(n/total*100)}%</span>
    </div>`).join('')||'<p style="font-size:12px;color:#aaa;">Sin datos</p>';
}

function barChartHTML(leads, field, label){
  const counts = {};
  leads.forEach(l=>{
    const v = (l[field]||'Sin especificar').toString().trim();
    counts[v] = (counts[v]||0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total  = leads.length || 1;
  const max    = sorted[0]?.[1] || 1;
  const colors = ['#534AB7','#3DB8E8','#F5A623','#1D9E75','#E8721C','#7F77DD','#E24B4A','#27AE60','#00C9FF','#D85A30','#FF6B6B','#4ECDC4'];

  if(!sorted.length) return '<p style="font-size:12px;color:#aaa;padding:8px 0;">Sin datos</p>';

  return sorted.map(([v,n],i)=>{
    const pct  = Math.round(n/total*100);
    const bar  = Math.max(Math.round(n/max*100), n>0?6:0);
    const color= colors[i % colors.length];
    const lbl  = v.length>30?v.slice(0,28)+'...':v;
    return `<div class="funnel-row">
      <span class="lbl" style="font-size:10px;" title="${v}">${lbl}</span>
      <div class="funnel-track">
        <div class="funnel-fill" style="width:${bar}%;background:${color};"></div>
      </div>
      <span class="pct" style="color:${color};min-width:52px;text-align:right;">${n} <span style="font-size:9px;color:#aaa;">(${pct}%)</span></span>
    </div>`;
  }).join('');
}

function girosHTML(leads){
  const girosCount = {};
  leads.forEach(l=>{
    const g = (l.giros||'Sin especificar').trim();
    girosCount[g] = (girosCount[g]||0) + 1;
  });
  const sorted = Object.entries(girosCount).sort((a,b)=>b[1]-a[1]);
  const total  = leads.length || 1;
  const max    = sorted[0]?.[1] || 1;

  const colors = [
    '#534AB7','#3DB8E8','#F5A623','#1D9E75','#E8721C',
    '#7F77DD','#E24B4A','#27AE60','#00C9FF','#D85A30',
    '#FF6B6B','#4ECDC4','#FFD93D','#6BCF7F','#FF8C42'
  ];

  if(!sorted.length) return '<p style="font-size:12px;color:#aaa;padding:12px 0;">Sin datos de giros</p>';

  return sorted.map(([g,n], i)=>{
    const pct  = Math.round(n/total*100);
    const bar  = Math.max(Math.round(n/max*100), n>0?6:0);
    const color= colors[i % colors.length];
    return `<div class="funnel-row">
      <span class="lbl" style="font-size:10px;" title="${g}">${g.length>28?g.slice(0,26)+'...':g}</span>
      <div class="funnel-track">
        <div class="funnel-fill" style="width:${bar}%;background:${color};"></div>
      </div>
      <span class="pct" style="color:${color};min-width:52px;text-align:right;">${n} <span style="font-size:9px;color:#aaa;">(${pct}%)</span></span>
    </div>`;
  }).join('');
}

/* ── FETCH LEADS HELPER ── */
async function fetchLeads(){
  const rawLeads = await sbGet('leads','select=*&order=created_at.desc');
  const hm={};
  SB_USUARIOS.forEach(u=>{hm[u.id]=u.username;});
  const mapped = rawLeads.map(l=>({
    id:l.id, hunter:hm[l.hunter_id]||'',
    name:l.razon_social||l.nombre||'(Sin nombre)',
    ruc:l.ruc||'',
    owner:(SB_USUARIOS.find(u=>u.id===l.hunter_id)||{}).nombre||'',
    giros:l.giros||'', source:l.fuente||'',
    tipo_producto:l.tipo_producto||'', tipo_cuenta:l.tipo_cuenta||'',
    banco:l.banco||'', status:mapEstado(l.estado||'prospecto'),
    value:l.valor||0, close:l.mes_cierre||'',
    note:l.comentario||'', prob:l.probabilidad||10,
    conflict:l.conflicto||false, categoria:l.categoria||'activo',
    linea:l.linea||'central',
    telefono:l.telefono||'', representante_legal:l.representante_legal||'',
    tipo_sva:l.tipo_sva||'', parlantes:l.parlantes||0,
    arisale_valor:l.arisale_valor||0, arisale_licencias:l.arisale_licencias||0,
    planillas_colaboradores:l.planillas_colaboradores||0,
    etapa_implementacion:l.etapa_implementacion||'',
    created:l.created_at?new Date(l.created_at).toLocaleDateString('es-PE'):'',
    fecha_ingreso:l.fecha_ingreso?new Date(l.fecha_ingreso).toLocaleDateString('es-PE'):'—',
    fecha_ingreso_raw:l.fecha_ingreso||'',
    fecha_modif:l.fecha_modif?new Date(l.fecha_modif).toLocaleDateString('es-PE'):'—',
    fecha_modif_raw:l.fecha_modif||'',
    fecha_cierre_dt:l.fecha_cierre?new Date(l.fecha_cierre).toLocaleDateString('es-PE'):'—',
    fecha_cierre_raw:l.fecha_cierre?l.fecha_cierre.slice(0,10):'',
    fecha_mod_late:l.fecha_modif?(Date.now()-new Date(l.fecha_modif).getTime())>86400000:false,
    modified_today:l.fecha_modif?new Date(l.fecha_modif).toDateString()===new Date().toDateString():false,
  }));
  mapped.forEach(l=>{l.status=mapEstado(l.status);});
  HUNTERS_DEF.forEach(h=>{h.real=0;});
  mapped.forEach(l=>{if(HUNTERS[l.hunter])HUNTERS[l.hunter].real+=(l.value||0);});
  return mapped;
}

/* ── TOAST NOTIFICATIONS ── */
function showToast(msg, type='success'){
  const existing = document.getElementById('toast-msg');
  if(existing) existing.remove();
  const colors = {
    success: {bg:'#1D9E75', icon:'✅'},
    error:   {bg:'#E24B4A', icon:'❌'},
    warning: {bg:'#F5A623', icon:'⚠️'},
    info:    {bg:'#534AB7', icon:'ℹ️'}
  };
  const c = colors[type] || colors.success;
  const t = document.createElement('div');
  t.id = 'toast-msg';
  t.innerHTML = `${c.icon} ${msg}`;
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${c.bg};color:#fff;
    padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;
    box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideIn .3s ease;`;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 3000);
}

async function saveHistorial(leadId, campo, valorNuevo){
  try {
    await sbInsert('lead_historial', {
      lead_id:     leadId,
      usuario:     curUser.name,
      rol:         curUser.role,
      campo:       FIELD_LABELS[campo] || campo,
      valor_nuevo: String(valorNuevo || '—'),
      fecha:       new Date().toISOString()
    });
  } catch(e){ console.warn('historial error:', e); }
}

async function loadHistorial(leadId){
  try {
    const rows = await sbGet('lead_historial',
      `lead_id=eq.${leadId}&order=fecha.desc&limit=50`);
    return rows || [];
  } catch(e){ return []; }
}

/* ── PERMISOS CENTRALIZADOS ──
   director / analista  → ven y editan TODO
   head                 → ven y editan SOLO su equipo
   hunter               → solo agrega leads y edita comentario + fecha modif de los suyos
*/
function isMyTeamLead(lead){
  if(!lead) return false;
  const h = HUNTERS[lead.hunter];
  return h && h.team === curUser.equipo;
}
function canDelete(lead){
  const r = curUser.role;
  if(r==='director' || r==='analista') return true;
  if(r==='head') return isMyTeamLead(lead);
  return false;
}
function canFullEdit(lead){
  const r = curUser.role;
  if(r==='director' || r==='analista') return true;
  if(r==='head') return isMyTeamLead(lead);
  return false;
}
function canPartialEdit(lead){
  // director, analista, head (solo su equipo) pueden editar potencial/banco/etapa/mes/fechas
  return canFullEdit(lead);
}
function canEditComment(lead){
  // Hunter: sus propios leads; Head: leads de su equipo; Director/Analista: todos (ya tienen full=true)
  if(curUser.role === 'hunter') return lead?.hunter === curUser.username;
  if(curUser.role === 'head') return isMyTeamLead(lead);
  return false; // director/analista usan full edit en su lugar
}
function canAddLead(){
  return true; // todos pueden agregar leads
}

/* Global registry to safely pass UUIDs without quote issues */
const LEAD_REG = {};
function regLead(l){ LEAD_REG[l.id] = l; return l.id; }
function getLead(id){ return LEADS.find(l=>l.id===id) || LEAD_REG[id]; }

let _searchTimer = null;

  const el = e.target;
  if(!el.classList.contains('search-box') && el.id !== 'kpi-search') return;
  const key = el.dataset.key || el.id;
  const v = el.value;

function filterTableRows(inputEl, q){
  q = (q||'').toLowerCase().trim();
  /* Find the closest table in content */
  const content = document.getElementById('content');
  if(!content) return;
  const tbodies = content.querySelectorAll('table tbody');
  tbodies.forEach(tbody=>{
    let shown = 0, total = 0;
    tbody.querySelectorAll('tr').forEach(tr=>{
      if(tr.id && tr.id.startsWith('hist-')) return; /* skip historial rows */
      total++;
      const txt = (tr.innerText||tr.textContent||'').toLowerCase();
      const show = !q || txt.includes(q);
      tr.style.display = show ? '' : 'none';
      /* hide historial row too if parent hidden */
      if(tr.id && tr.id.startsWith('row-')){
        const hRow = document.getElementById('hist-'+tr.id.slice(4));
        if(hRow) hRow.style.display = show ? '' : 'none';
      }
      if(show) shown++;
    });
    /* Update counter */
    const tc = document.getElementById('tc');
    if(tc) tc.textContent = 'Mostrando '+shown+' de '+total+' registros';
  });
}

/* ── HUNTER: Guardar modificación diaria ── */
async function hunterGuardar(leadId, key){
  const comentarioEl = document.getElementById('comentario-'+leadId);
  const comentario = comentarioEl ? comentarioEl.value : '';
  const hoy = new Date().toISOString().slice(0,10);

  /* Hunters deben escribir un comentario; Head/Director/Analista pueden guardar sin comentario */
  if(!comentario.trim() && curUser.role === 'hunter'){
    showToast('Por favor escribe un comentario antes de guardar.', 'warning');
    return;
  }

  const btn = event.target.closest('button');
  if(btn){ btn.textContent='Guardando...'; btn.disabled=true; }

  try {
    _isSavingLocally = true; /* evitar que realtime interrumpa */
    /* Save comentario and fecha_modif */
    await sbPatch('leads', leadId, {
      comentario: comentario,
      fecha_modif: hoy,
      updated_at: new Date().toISOString()
    });

    /* Guardar en historial solo el comentario (fecha_modif se actualiza automáticamente) */
    if(comentario.trim()){
      const leadActual = LEADS.find(x=>String(x.id)===String(leadId));
      if(!leadActual || comentario !== (leadActual.note||'')){
        await saveHistorial(leadId, 'comentario', comentario);
      }
    }

    /* Actualizar solo la celda de fecha_modif en el DOM sin re-renderizar toda la tabla */
    const l = LEADS.find(x=>String(x.id)===String(leadId));
    if(l){
      l.note = comentario;
      l.fecha_modif_raw = hoy;
      l.fecha_modif = new Date(hoy).toLocaleDateString('es-PE');
      l.modified_today = true;
      l.fecha_mod_late = false;
    }
    /* Actualizar celda F. Modificación directamente en el DOM (sin re-render) */
    const fmodCell = document.getElementById('fmod-'+leadId);
    if(fmodCell) fmodCell.textContent = new Date(hoy).toLocaleDateString('es-PE');

    showToast('✅ Comentario guardado', 'success');
    if(btn){ btn.textContent='✅ Guardado'; btn.style.background='#1D9E75'; }
    setTimeout(()=>{
      if(btn){ btn.textContent='💾 Guardar'; btn.style.background='#7F77DD'; btn.disabled=false; }
      _isSavingLocally = false; /* volver a escuchar realtime después de 3s */
    }, 3000);

  } catch(e){
    _isSavingLocally = false;
    showToast('❌ Error al guardar: '+e.message, 'error');
    if(btn){ btn.textContent='💾 Guardar'; btn.disabled=false; }
  }
}

async function updateLeadDB(id, field, value, key){
  /* Save single field directly to Supabase */
  const hoy = new Date().toISOString().slice(0,10);
  const body = { [field]: field==='valor'?Number(value):value, updated_at: new Date().toISOString() };
  /* Cualquier modificación actualiza también la fecha de modificación (salvo que el campo editado SEA esa fecha) */
  if(field!=='fecha_modif'){ body.fecha_modif = hoy; }
  /* Auto-cerrado: si la nueva etapa es 100%, marcar categoría=cerrado en el mismo PATCH */
  if(field==='estado' && mapEstado(value)==='cerrado'){ body.categoria = 'cerrado'; }

  const l = LEADS.find(x => String(x.id) === String(id));

  try {
    await sbPatch('leads', id, body);
  } catch(e){
    showToast('❌ '+e.message, 'error');
    renderTab(curTab); /* revertir el control visual al valor real */
    return;
  }

  /* Save to historial */
  await saveHistorial(id, field, value);
  if(field==='estado' && mapEstado(value)==='cerrado'){
    await saveHistorial(id,'categoria','✅ Lead Cerrado (auto)');
  }

  /* ── Releer el lead directamente de Supabase para garantizar que la fila
     refleje exactamente la última modificación guardada (sin depender de
     mutaciones locales que podían desincronizarse) ── */
  let row = null;
  try {
    const fresh = await sbGet('leads', `id=eq.${id}&select=*&limit=1`);
    row = fresh && fresh[0];
  } catch(e){ /* si falla la relectura, seguimos con actualización local */ }

  if(l && row){
    l.name = row.razon_social || row.nombre || '(Sin nombre)';
    l.ruc = row.ruc || '';
    l.giros = row.giros || '';
    l.source = row.fuente || '';
    l.tipo_producto = row.tipo_producto || '';
    l.tipo_cuenta = row.tipo_cuenta || '';
    l.banco = row.banco || '';
    l.status = mapEstado(row.estado || 'prospecto');
    l.value = row.valor || 0;
    l.close = row.mes_cierre || '';
    l.note = row.comentario || '';
    l.categoria = row.categoria || 'activo';
    l.telefono = row.telefono || '';
    l.representante_legal = row.representante_legal || '';
    l.tipo_sva = row.tipo_sva || '';
    l.parlantes = row.parlantes || 0;
    l.arisale_valor = row.arisale_valor || 0;
    l.arisale_licencias = row.arisale_licencias || 0;
    l.planillas_colaboradores = row.planillas_colaboradores || 0;
    l.etapa_implementacion = row.etapa_implementacion || '';
    l.fecha_ingreso_raw = row.fecha_ingreso || '';
    l.fecha_ingreso = row.fecha_ingreso ? new Date(row.fecha_ingreso).toLocaleDateString('es-PE') : '—';
    l.fecha_modif_raw = row.fecha_modif || '';
    l.fecha_modif = row.fecha_modif ? new Date(row.fecha_modif).toLocaleDateString('es-PE') : '—';
    l.fecha_mod_late = row.fecha_modif ? (Date.now()-new Date(row.fecha_modif).getTime())>86400000 : false;
    l.modified_today = row.fecha_modif ? new Date(row.fecha_modif).toDateString()===new Date().toDateString() : false;
    l.fecha_cierre_raw = row.fecha_cierre ? row.fecha_cierre.slice(0,10) : '';
    l.fecha_cierre_dt = row.fecha_cierre ? new Date(row.fecha_cierre).toLocaleDateString('es-PE') : '—';
  } else if(l){
    /* Refetch falló: aplicar el cambio localmente como fallback (la BD ya tiene el PATCH guardado) */
    if(field==='valor') l.value = Number(value);
    else if(field==='banco') l.banco = value;
    else if(field==='estado') l.status = mapEstado(value);
    else if(field==='mes_cierre') l.close = value;
    else if(field==='comentario') l.note = value;
    else if(field==='fecha_ingreso'){ l.fecha_ingreso_raw=value; l.fecha_ingreso = value?new Date(value).toLocaleDateString('es-PE'):'—'; }
    else if(field==='fecha_modif'){ l.fecha_modif_raw=value; l.fecha_modif = value?new Date(value).toLocaleDateString('es-PE'):'—';
      l.modified_today = value?new Date(value).toDateString()===new Date().toDateString():false; }
    if(field!=='fecha_modif'){ l.fecha_modif_raw=hoy; l.fecha_modif=new Date(hoy).toLocaleDateString('es-PE'); l.modified_today=true; l.fecha_mod_late=false; }
    if(field==='estado' && l.status==='cerrado') l.categoria='cerrado';
  }

  /* Mostrar confirmación de guardado */
  showToast('✅ Guardado', 'success');

  /* Re-render para reflejar la última modificación y/o cambios de funnel */
  renderTab(curTab);
}

  });

  if(id){
    const l=LEADS.find(x=>String(x.id)===String(id));

      document.getElementById('m-name').value=l.name||'';
      document.getElementById('m-ruc').value=l.ruc||'';

async function handleImport(input){
  const file = input.files[0];
  if(!file){ return; }
  input.value = '';

  if(!['director','analista','head'].includes(curUser.role)){
    alert('No tienes permisos para importar.'); return;
  }

  const ext = file.name.split('.').pop().toLowerCase();
  let rows = [];

  /* Show loading */
  const btn = document.getElementById('import-lbl-wrap');
  const txt = document.getElementById('import-txt');
  if(txt) txt.textContent = 'Procesando...';
  if(btn) btn.disabled = true;

  try {
    if(ext === 'csv'){
      const text = await file.text();
      rows = parseCSVToRows(text);
    } else if(ext === 'xlsx' || ext === 'xls'){
      if(typeof XLSX === 'undefined'){
        alert('La librería de Excel no cargó. Verifica tu conexión a internet.');
        return;
      }
      const ab = await file.arrayBuffer();
      const wb = XLSX.read(ab, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      rows = data.map(r => r.map(c => (c===null||c===undefined)?'':String(c).trim()));
    } else {
      alert('Formato no soportado. Usa .xlsx o .csv');
      return;
    }
  } catch(e){
    alert('Error al leer el archivo: ' + e.message);
    return;
  }

  if(rows.length < 2){ alert('El archivo está vacío o no tiene datos.'); return; }

  const headers = rows[0].map(h => (h||'').toString().trim().toUpperCase());
  console.log('Headers importados:', headers);

  /* Build hunter name → id map */
  const hunterNameMap = {};
  SB_USUARIOS.forEach(u => {
    if(u.rol === 'hunter' || u.rol === 'head'){
      hunterNameMap[u.nombre.toUpperCase().trim()] = u.id;
      /* Also match by first name or partial */
      const parts = u.nombre.toUpperCase().split(' ');
      if(parts[0]) hunterNameMap[parts[0]] = u.id;
    }
  });

  /* Column index finder */
  const col = (...keys) => {
    for(const k of keys){
      const idx = headers.findIndex(h => h.includes(k));
      if(idx >= 0) return idx;
    }
    return -1;
  };

  const iHunter   = col('HUNTER','EJECUTIV','RESPONSABLE');
  const iRazon    = col('RAZON SOCIAL','RAZON','EMPRESA','NOMBRE');
  const iRuc      = col('RUC');
  const iGiros    = col('GIROS','GIRO','ACTIVIDAD');
  const iOrigen   = col('ORIGEN','FUENTE','SOURCE');
  const iTipoP    = col('TIPO DE PRODUCTO','TIPO PROD','PRODUCTO');
  const iTipoC    = col('TIPO DE CUENTA','TIPO CUEN','CUENTA');
  const iBanco    = col('BANCO','ENTIDAD');
  const iPotenc   = col('POTENC','POTENCIAL','VALOR','MONTO');
  const iEtapa    = col('ETAPA','ESTADO','STAGE');
  const iMes      = col('MES DE CIERRE','MES CIERR','MES');
  const iComent   = col('COMENTARIO','COMMENT','NOTA','OBS');

  const g = (row, idx) => idx >= 0 ? (row[idx]||'').toString().trim() : '';

  /* Build existing RUC -> lead id map (for upsert) and name set as fallback */
  const existingByRuc = {};
  const existingByName = {};
  LEADS.forEach(l => {
    const ruc = (l.ruc||'').trim();
    const name = (l.name||'').trim().toLowerCase();
    if(ruc) existingByRuc[ruc] = l.id;
    else if(name) existingByName[name] = l.id;
  });

  /* Also track file hash to warn if same file is re-imported */
  const fileKey = `import_${file.name}_${file.size}_${file.lastModified}`;
  const prevImports = JSON.parse(localStorage.getItem('imported_files')||'[]');
  if(prevImports.includes(fileKey)){
    const proceed = confirm(`⚠️ Ya importaste el archivo "${file.name}" anteriormente.\n\n¿Deseas importarlo de nuevo? Los leads duplicados serán omitidos automáticamente.`);
    if(!proceed){
      if(txt) txt.textContent = 'Importar Excel';
      if(btn) btn.disabled = false;
      return;
    }
  }

  let inserted = 0, updated = 0, skipped = 0, duplicates = 0, errors = [];

  for(let i = 1; i < rows.length; i++){
    const row = rows[i];
    if(row.every(c => !c || c.toString().trim() === '')) continue;

    const hunterName = g(row, iHunter).toUpperCase();
    const razon = g(row, iRazon);
    if(!razon){ skipped++; continue; }

    /* Check for existing lead by RUC or name -> will UPSERT instead of skip */
    const rucVal = g(row, iRuc).trim();
    let existingId = null;
    if(rucVal && existingByRuc[rucVal]) existingId = existingByRuc[rucVal];
    else if(!rucVal && existingByName[razon.trim().toLowerCase()]) existingId = existingByName[razon.trim().toLowerCase()];

    /* Find hunter_id by name - exact match, then word-overlap fuzzy match */
    let hunter_id = null, equipo = null;
    if(hunterName){
      /* 1) Try exact match */
      hunter_id = hunterNameMap[hunterName];

      /* 2) Substring match (covers "OLIVER LOPEZ" vs "LOPEZ SUMALAVIA, OLIVER ENRIQUE") */
      if(!hunter_id){
        const match = SB_USUARIOS.find(u =>
          (u.rol==='hunter'||u.rol==='head') && (
            u.nombre.toUpperCase().includes(hunterName) ||
            hunterName.includes(u.nombre.toUpperCase())
          )
        );
        if(match) hunter_id = match.id;
      }

      /* 3) Word-overlap fuzzy match - tolerates spelling diffs (Melissa/Melisa) by matching surnames */
      if(!hunter_id){
        const importWords = hunterName.split(/[\s,]+/).filter(w=>w.length>=3);
        let best = null, bestScore = 0;
        SB_USUARIOS.forEach(u=>{
          if(u.rol!=='hunter' && u.rol!=='head') return;
          const dbWords = u.nombre.toUpperCase().split(/[\s,]+/).filter(w=>w.length>=3);
          let score = 0;
          importWords.forEach(iw=>{
            dbWords.forEach(dw=>{
              if(iw===dw) score += 2; /* exact word match */
              else if(iw.length>=5 && dw.length>=5 && (iw.includes(dw)||dw.includes(iw))) score += 1; /* partial (Melisa/Melissa) */
            });
          });
          if(score > bestScore){ bestScore = score; best = u; }
        });
        if(best && bestScore >= 1) hunter_id = best.id;
      }

      if(hunter_id){
        const hu = SB_USUARIOS.find(u => u.id === hunter_id);
        if(hu) equipo = hu.equipo;
      }
    }

    /* If head is importing and no hunter found, assign to head themselves */
    if(!hunter_id && curUser.role === 'head'){
      const meAsUser = SB_USUARIOS.find(u => u.username === curUser.username);
      if(meAsUser){ hunter_id = meAsUser.id; equipo = meAsUser.equipo; }
    }

    const potStr = g(row, iPotenc).replace(/[^0-9.]/g,'');
    const payload = {
      nombre:        razon,
      razon_social:  razon,
      ruc:           g(row, iRuc) || null,
      hunter_id:     hunter_id || null,
      equipo:        equipo || null,
      giros:         g(row, iGiros) || null,
      fuente:        g(row, iOrigen) || null,
      tipo_producto: g(row, iTipoP) || null,
      tipo_cuenta:   g(row, iTipoC) || null,
      banco:         g(row, iBanco) || null,
      valor:         parseFloat(potStr) || 0,
      estado:        mapEstadoImport(g(row, iEtapa)),
      categoria:     mapEstadoImport(g(row, iEtapa))==='cerrado' ? 'cerrado' : 'activo',
      mes_cierre:    g(row, iMes) || null,
      comentario:    g(row, iComent) || null,
    };

    try {
      if(existingId){
        /* UPDATE existing lead with new data from this import (etapa, valor, etc.) */
        await sbPatch('leads', existingId, {
          ...payload,
          updated_at: new Date().toISOString()
        });
        updated++;
      } else {
        const res = await sbPost('leads', payload);
        const newId = res?.[0]?.id;
        if(newId && rucVal) existingByRuc[rucVal] = newId;
        else if(newId) existingByName[razon.trim().toLowerCase()] = newId;
        inserted++;
      }
    } catch(e){
      errors.push(`Fila ${i+1}: ${e.message}`);
      skipped++;
    }
  }

  /* Reload leads */
  const rawLeads = await sbGet('leads','select=*&order=created_at.desc');
  const hunterMap2 = {};
  SB_USUARIOS.forEach(u => { hunterMap2[u.id] = u.username; });
  LEADS = rawLeads.map((l,i) => ({
    id:            l.id,
    hunter:        hunterMap2[l.hunter_id] || '',
    name:          l.razon_social || l.nombre || '(Sin nombre)',
    ruc:           l.ruc || '',
    owner:         (SB_USUARIOS.find(u=>u.id===l.hunter_id)||{}).nombre || '',
    giros:         l.giros || '',
    source:        l.fuente || '',
    tipo_producto: l.tipo_producto || '',
    tipo_cuenta:   l.tipo_cuenta || '',
    banco:         l.banco || '',
    status:        mapEstado(l.estado || 'prospecto'),
    value:         l.valor || 0,
    close:         l.mes_cierre || '',
    note:          l.comentario || '',
    prob:          l.probabilidad || 10,
    conflict:      l.conflicto || false,
    created:       l.created_at ? new Date(l.created_at).toLocaleDateString('es-PE') : '',
  }));

  HUNTERS_DEF.forEach(h => { h.real = 0; });
  LEADS.forEach(l => { if(HUNTERS[l.hunter]) HUNTERS[l.hunter].real += (l.value||0); });

  renderTab(curTab);
  /* Save file as imported */
  const prevImports2 = JSON.parse(localStorage.getItem('imported_files')||'[]');
  if(!prevImports2.includes(fileKey)){
    prevImports2.push(fileKey);
    localStorage.setItem('imported_files', JSON.stringify(prevImports2.slice(-50)));
  }
  if(txt) txt.textContent = 'Importar Excel';
  if(btn) btn.disabled = false;
  alert(`✅ Importación completada:\n• ${inserted} leads nuevos\n• ${updated} leads actualizados (RUC ya existía)\n• ${skipped} filas vacías/con error${errors.length?'\n\nErrores:\n'+errors.slice(0,5).join('\n'):''}`);
}

async function handleImportWithLinea(file, linea){
  if(!['director','analista','head'].includes(curUser.role)){
    alert('No tienes permisos para importar.'); return;
  }
  const ext = file.name.split('.').pop().toLowerCase();
  let rows = [];
  try {
    if(ext==='csv'){
      const text = await file.text();
      rows = parseCSVToRows(text);
    } else if(ext==='xlsx'||ext==='xls'){
      if(typeof XLSX==='undefined'){ alert('SheetJS no cargó.'); return; }
      const ab = await file.arrayBuffer();
      const wb = XLSX.read(ab,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''})
               .map(r=>r.map(c=>c===null||c===undefined?'':String(c).trim()));
    } else { alert('Formato no soportado.'); return; }
  } catch(e){ alert('Error al leer: '+e.message); return; }

  if(rows.length<2){ alert('Archivo vacío.'); return; }
  const headers = rows[0].map(h=>(h||'').toString().trim().toUpperCase());
  const col=(...keys)=>{ for(const k of keys){ const i=headers.findIndex(h=>h.includes(k)); if(i>=0) return i; } return -1; };
  const g=(row,idx)=>idx>=0?(row[idx]||'').toString().trim():'';

  const iHunter=col('HUNTER','EJECUTIV'); const iRazon=col('RAZON','EMPRESA','NOMBRE');
  const iRuc=col('RUC'); const iGiros=col('GIROS','GIRO');
  const iOrigen=col('ORIGEN','FUENTE'); const iTipoP=col('TIPO DE PRODUCTO','TIPO PROD','PRODUCTO');
  const iTipoC=col('TIPO DE CUENTA','TIPO CUEN'); const iBanco=col('BANCO');
  const iPotenc=col('POTENC','POTENCIAL','VALOR'); const iEtapa=col('ETAPA','ESTADO');
  const iMes=col('MES'); const iComent=col('COMENTARIO','NOTA');
  /* Columnas específicas de SVA */
  const iTelefono=col('TELEFONO','TELÉFONO','CELULAR');
  const iRepLegal=col('REPRESENTANTE','REP. LEGAL','REP LEGAL');
  const iTipoSva=col('TIPO SVA');
  const iParlantes=col('PARLANTE');
  const iArisaleValor=col('ARISALE (VALOR','VALOR LICENCIAS','ARISALE VALOR');
  const iArisaleLic=col('LICENCIAS ARISALE','TOTAL LICENCIAS','LICENCIAS (TOTAL');
  const iPlanillasColab=col('PLANILLAS','COLABORADORES');
  const iEtapaImpl=col('ETAPA IMPLEMENTACION','ETAPA IMPLEMENTACIÓN','IMPLEMENTACION');

  const hunterNameMap={};
  SB_USUARIOS.forEach(u=>{
    hunterNameMap[u.nombre.toUpperCase().trim()]=u.id;
    u.nombre.toUpperCase().split(' ').forEach(w=>{ if(!hunterNameMap[w]) hunterNameMap[w]=u.id; });
  });

  const existingByRuc={}, existingByName={};
  LEADS.forEach(l=>{
    const ruc=(l.ruc||'').trim();
    const name=(l.name||'').trim().toLowerCase();
    if(ruc) existingByRuc[ruc]=l.id;
    else if(name) existingByName[name]=l.id;
  });
  let inserted=0,updated=0,skipped=0;
  const importErrors=[];

  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    if(row.every(c=>!c||!c.toString().trim())) continue;
    /* Razón Social opcional — si está vacía usar "Sin nombre" como placeholder */
    const razon=g(row,iRazon) || g(row,iHunter) && 'Sin nombre' || 'Sin nombre';
    const rucVal=g(row,iRuc).trim();
    let existingId=null;
    if(rucVal && existingByRuc[rucVal]){
      /* Upsert por RUC (identificador único confiable) */
      existingId=existingByRuc[rucVal];
    } else if(rucVal==='' && razon && razon!=='Sin nombre' && existingByName[razon.trim().toLowerCase()]){
      /* Upsert por nombre solo si tiene nombre real (no "Sin nombre") */
      existingId=existingByName[razon.trim().toLowerCase()];
    }
    /* Si no hay RUC ni Razón Social real → siempre insertar como nuevo lead */

    const hunterName=g(row,iHunter).toUpperCase();
    let hunter_id=null,equipo=null;
    if(hunterName){
      hunter_id=hunterNameMap[hunterName]||null;
      if(!hunter_id){
        const m=SB_USUARIOS.find(u=>(u.rol==='hunter'||u.rol==='head')&&(u.nombre.toUpperCase().includes(hunterName)||hunterName.includes(u.nombre.toUpperCase())));
        if(m){hunter_id=m.id;}
      }
      if(!hunter_id){
        const importWords=hunterName.split(/[\s,]+/).filter(w=>w.length>=3);
        let best=null,bestScore=0;
        SB_USUARIOS.forEach(u=>{
          if(u.rol!=='hunter'&&u.rol!=='head')return;
          const dbWords=u.nombre.toUpperCase().split(/[\s,]+/).filter(w=>w.length>=3);
          let score=0;
          importWords.forEach(iw=>dbWords.forEach(dw=>{
            if(iw===dw)score+=2;
            else if(iw.length>=5&&dw.length>=5&&(iw.includes(dw)||dw.includes(iw)))score+=1;
          }));
          if(score>bestScore){bestScore=score;best=u;}
        });
        if(best&&bestScore>=1)hunter_id=best.id;
      }
      if(hunter_id){const hu=SB_USUARIOS.find(u=>u.id===hunter_id);if(hu)equipo=hu.equipo;}
    }
    const potStr=g(row,iPotenc).replace(/[^0-9.]/g,'');
    const estadoMapped=mapEstadoImport(g(row,iEtapa));

    let tipoSvaVal = (g(row,iTipoSva)||g(row,iTipoP)||'').toUpperCase();
    /* Normalizar variantes: "QR PARLANTE"->QR, "PLANILLAS IBK"->PLANILLAS, etc. */
    if(tipoSvaVal.includes('QR')) tipoSvaVal='QR';
    else if(tipoSvaVal.includes('ARISALE')) tipoSvaVal='ARISALE';
    else if(tipoSvaVal.includes('PLANILLA')) tipoSvaVal='PLANILLAS';
    tipoSvaVal = tipoSvaVal || null;
    const parlantesVal = parseInt(g(row,iParlantes).replace(/[^0-9]/g,''))||null;
    const arisaleValorVal = parseFloat(g(row,iArisaleValor).replace(/[^0-9.]/g,''))||0;
    const arisaleLicVal = parseInt(g(row,iArisaleLic).replace(/[^0-9]/g,''))||null;
    const planillasColabVal = parseInt(g(row,iPlanillasColab).replace(/[^0-9]/g,''))||null;
    const etapaImplVal = g(row,iEtapaImpl).toUpperCase()||null;

    /* Para SVA, el "valor" principal es el de Arisale (licencias); si no es Arisale, usa Potencial si existe */
    let valorFinal = arisaleValorVal;
    if(!valorFinal) valorFinal = parseFloat(potStr)||0;

    const payload={
      nombre:razon,razon_social:razon,ruc:rucVal||null,hunter_id,equipo,
      giros:g(row,iGiros)||null,fuente:g(row,iOrigen)||null,
      tipo_producto:(linea==='sva'?tipoSvaVal:g(row,iTipoP)||null),
      tipo_cuenta:g(row,iTipoC)||null,
      banco:g(row,iBanco)||null,valor:valorFinal,
      estado:estadoMapped,
      categoria: estadoMapped==='cerrado' ? 'cerrado' : 'activo',
      mes_cierre:g(row,iMes)||null,
      comentario:g(row,iComent)||null,linea:linea,
      telefono:g(row,iTelefono)||null,
      representante_legal:g(row,iRepLegal)||null,
      tipo_sva:tipoSvaVal,
      parlantes:parlantesVal,
      arisale_valor:arisaleValorVal||null,
      arisale_licencias:arisaleLicVal,
      planillas_colaboradores:planillasColabVal,
      etapa_implementacion:etapaImplVal,
      fecha_ingreso:new Date().toISOString().slice(0,10)
    };

    try{
      if(existingId){
        await sbPatch('leads', existingId, {...payload, updated_at:new Date().toISOString()});
        updated++;
      } else {
        const res=await sbPost('leads',payload);
        const newId=res?.[0]?.id;
        if(newId && rucVal) existingByRuc[rucVal]=newId;
        else if(newId) existingByName[razon.trim().toLowerCase()]=newId;
        inserted++;
      }
    }
    catch(e){
      skipped++;
      if(!importErrors.length) importErrors.push('Fila '+(i+1)+' ('+razon+'): '+e.message);
    }
  }

  /* Reload leads */
  const rawLeads=await sbGet('leads','select=*&order=created_at.desc');
  const hm={};SB_USUARIOS.forEach(u=>{hm[u.id]=u.username;});
  LEADS=rawLeads.map((l,i)=>({
    id:l.id,hunter:hm[l.hunter_id]||'',
    name:l.razon_social||l.nombre||'(Sin nombre)',ruc:l.ruc||'',
    owner:(SB_USUARIOS.find(u=>u.id===l.hunter_id)||{}).nombre||'',
    giros:l.giros||'',source:l.fuente||'',tipo_producto:l.tipo_producto||'',
    tipo_cuenta:l.tipo_cuenta||'',banco:l.banco||'',
    status:mapEstado(l.estado||'prospecto'),value:l.valor||0,
    close:l.mes_cierre||'',note:l.comentario||'',prob:l.probabilidad||10,
    conflict:l.conflicto||false,categoria:l.categoria||'activo',linea:l.linea||'central',
    telefono:l.telefono||'', representante_legal:l.representante_legal||'',
    tipo_sva:l.tipo_sva||'', parlantes:l.parlantes||0,
    arisale_valor:l.arisale_valor||0, arisale_licencias:l.arisale_licencias||0,
    planillas_colaboradores:l.planillas_colaboradores||0,
    etapa_implementacion:l.etapa_implementacion||'',
    created:l.created_at?new Date(l.created_at).toLocaleDateString('es-PE'):'',
    fecha_ingreso:l.fecha_ingreso?new Date(l.fecha_ingreso).toLocaleDateString('es-PE'):'—',
    fecha_ingreso_raw:l.fecha_ingreso||'',
    fecha_modif:l.fecha_modif?new Date(l.fecha_modif).toLocaleDateString('es-PE'):'—',
    fecha_modif_raw:l.fecha_modif||'',fecha_cierre_dt:l.fecha_cierre?new Date(l.fecha_cierre).toLocaleDateString('es-PE'):'—',
    fecha_cierre_raw:l.fecha_cierre?l.fecha_cierre.slice(0,10):'',
    fecha_mod_late:l.fecha_modif?(Date.now()-new Date(l.fecha_modif).getTime())>86400000:false,
    modified_today:l.fecha_modif?new Date(l.fecha_modif).toDateString()===new Date().toDateString():false,
  }));
  LEADS.forEach(l=>{l.status=mapEstado(l.status);});
  HUNTERS_DEF.forEach(h=>{h.real=0;});
  LEADS.forEach(l=>{if(HUNTERS[l.hunter])HUNTERS[l.hunter].real+=(l.value||0);});
  renderTab(curTab);
  let msg='✅ Importación '+linea.toUpperCase()+':\n• '+inserted+' leads nuevos\n• '+updated+' leads actualizados\n• '+skipped+' omitidos';
  if(importErrors.length) msg += '\n\n⚠️ Error: '+importErrors[0];
  alert(msg);
}

function mapEstadoImport(e){
  const raw = (e||'').toLowerCase().trim();

  /* Códigos internos ya correctos */
  if(['prospecto','oportunidad','negociacion','precierre','cerrado'].includes(raw)) return raw;

  /* Prioridad: prefijo de porcentaje (más confiable para textos largos del Excel) */
  if(/^100\s*%/.test(raw) || raw.startsWith('100')) return 'cerrado';
  if(/^75\s*%/.test(raw)  || raw.startsWith('75'))  return 'precierre';
  if(/^50\s*%/.test(raw)  || raw.startsWith('50'))  return 'negociacion';
  if(/^25\s*%/.test(raw)  || raw.startsWith('25'))  return 'oportunidad';
  if(/^10\s*%/.test(raw)  || raw.startsWith('10'))  return 'prospecto';

  /* Fallback por palabras clave, orden de más a menos específico */
  if(raw.includes('pre cierre') || raw.includes('pre-cierre') || raw.includes('precierre')) return 'precierre';
  if(raw.includes('negoci')) return 'negociacion';
  if(raw.includes('cierre') || raw.includes('cerrado')) return 'cerrado';
  if(raw.includes('oportunidad')) return 'oportunidad';
  return 'prospecto';
}

function parseCSVToRows(text){
  const lines = text.split(/\r?\n/);
  return lines.map(line => {
    const cols = []; let cur = '', inQ = false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){ inQ=!inQ; }
      else if(line[i]===','&&!inQ){ cols.push(cur); cur=''; }
      else { cur+=line[i]; }
    }
    cols.push(cur);
    return cols.map(c=>c.replace(/^"|"$/g,'').trim());
  });
}
